# Render configuration for FastAPI
services:
  - type: web
    name: movie-catalog
    env: docker
    dockerfilePath: Dockerfile
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: movie-catalog-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
    autoDeploy: true

databases:
  - name: movie-catalog-db
    plan: free
